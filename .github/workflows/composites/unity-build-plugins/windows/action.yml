name: build windows unity plugin

inputs:
  backend:
    description: 'js backend'     
    required: true
  config:
    type: choice
    description: Release Or Debug
    default: 'Release'
    options:
    - Release
    - Debug
  arch:
    type: choice
    description: building arch
    default: 'auto'
    options:
      - auto
      - x64
      - ia32
  websocket:
    description: enable websocket
    default: '3'
  build_proj_dir:
    description: 'build project dir'     
    required: false
    default: 'native_src'
  GITHUB_TOKEN:
    required:

runs:
  using: "composite"
  steps:
    - name: Install NASM
      shell: powershell
      run: |
        # 下载 NASM
        $url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.01/win64/nasm-2.16.01-win64.zip"
        $output = "$env:RUNNER_TEMP\nasm.zip"
        Invoke-WebRequest -Uri $url -OutFile $output
        
        # 解压到临时目录
        Expand-Archive -Path $output -DestinationPath "$env:RUNNER_TEMP\nasm"
        $nasmPath = "$env:RUNNER_TEMP\nasm\nasm-2.16.01"
        
        # 将 NASM 添加到当前会话的 PATH
        $env:PATH = "$nasmPath;$env:PATH"
        
        # 验证安装
        Write-Host "NASM installed at: $nasmPath"
        & "$nasmPath\nasm.exe" --version
        
        # 添加到 GITHUB_PATH 供后续步骤使用
        echo "$nasmPath" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

    - name: Build
      shell: powershell
      run: |
        cd unity
        npm i
        cd ${{ inputs.build_proj_dir }}
        node ../cli make --platform win --backend ${{ inputs.backend }} --config ${{ inputs.config }} --arch ${{ inputs.arch }} --websocket ${{ inputs.websocket }}
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        path: ./unity/Assets/core/upm/Plugins/**/*
        name: Unity_Plugins_${{ inputs.backend }}_${{ inputs.config }}_window
    - name: Clean
      shell: bash
      run: rm -rf ./unity/Assets/core/upm/Plugins/**/*